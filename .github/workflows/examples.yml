name: Build Examples

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build ${{ matrix.example }} @ IDF ${{ matrix.idf_version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        idf_version: ["v5.5.1"]
        example:
          - examples/direct
          - examples/lvgl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # esp-idf-ci-action sets up the IDF environment and runs idf.py build
      # inside the given working directory.  The component under test is made
      # available to each example via an `override_path` in its
      # idf_component.yml so the component manager uses the local source
      # rather than downloading from a registry.
      - name: Build ${{ matrix.example }}
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf_version }}
          target: esp32s3
          path: ${{ matrix.example }}

      - name: Prepare artifact name
        id: prep
        run: |
          NAME=$(echo "${{ matrix.example }}" | tr '/' '-')
          echo "name=${NAME}-${{ matrix.idf_version }}" >> "$GITHUB_OUTPUT"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prep.outputs.name }}
          path: |
            ${{ matrix.example }}/build/*.bin
            ${{ matrix.example }}/build/flash_args
            ${{ matrix.example }}/build/flash_project_args
          if-no-files-found: warn